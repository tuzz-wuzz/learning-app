<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindergarten Adventure Assessment</title>
    <style>
        :root {
            --primary: #FFD700;
            --secondary: #4CAF50;
            --accent: #2196F3;
            --danger: #F44336;
            --background: #fdf6e3;
            --text: #5d4037;
            --card-bg: #ffffff;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 8px solid var(--primary);
            position: relative;
        }

        h1 { font-size: 2.5em; color: var(--accent); margin-bottom: 20px; }
        h2 { font-size: 1.8em; }

        .btn {
            padding: 15px 30px;
            font-size: 1.5em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-start { background-color: var(--secondary); color: white; }
        .btn-option { background-color: var(--accent); color: white; width: 100%; max-width: 400px; }
        .btn:hover { transform: scale(1.05); }

        .screen { display: none; animation: fadeIn 0.5s ease-out forwards; }
        .active { display: block; }

        .subject-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
            text-align: left;
        }

        .subject-item {
            background: #eee;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .subject-item input { margin-right: 15px; transform: scale(1.5); }

        .progress-bar {
            background: #ddd;
            height: 20px;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-inner {
            background: var(--secondary);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .star-container { font-size: 2em; margin-bottom: 10px; }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            text-align: left;
            margin-top: 30px;
        }

        .report-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            border-left: 10px solid var(--accent);
        }

        .level-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
        }

        .above { background: var(--secondary); }
        .at { background: var(--primary); color: #333; }
        .below { background: var(--danger); }

        .skills-list { font-size: 0.9em; padding-left: 20px; }

        .option-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .option-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <h1>🌟 Learning Adventure! 🌟</h1>
        <p>Parents: Select the areas you want to explore today!</p>
        <div class="subject-selection">
            <label class="subject-item"><input type="checkbox" name="subject" value="English" checked> 📖 English</label>
            <label class="subject-item"><input type="checkbox" name="subject" value="Math" checked> 🔢 Math</label>
            <label class="subject-item"><input type="checkbox" name="subject" value="Science" checked> 🔬 Science</label>
        </div>
        <button class="btn btn-start" onclick="startGame()">Start Adventure! 🚀</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="star-container" id="star-counter">⭐ 0</div>
        <div class="progress-bar"><div class="progress-inner" id="progress"></div></div>
        <h2 id="question-text">Question loading...</h2>
        <div class="option-grid" id="options-container"></div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
        <h1>🏅 Adventure Report Card 🏅</h1>
        <div class="results-grid" id="results-container"></div>
        <button class="btn btn-start" style="margin-top: 40px;" onclick="location.reload()">Start Over 🔄</button>
    </div>
</div>

<script>
    const questionBank = [
        // MATH
        {
            subject: "Math",
            skill: "Numbers 0-5 Recognition",
            question: "Which one is the number THREE?",
            options: ["1", "3", "5", "2"],
            correctIndex: 1
        },
        {
            subject: "Math",
            skill: "Counting (within 10)",
            question: "How many apples are here? 🍎 🍎 🍎 🍎",
            options: ["3", "4", "5", "6"],
            correctIndex: 1
        },
        {
            subject: "Math",
            skill: "Addition (within 5)",
            question: "If you have 2 cookies and get 1 more, how many do you have?",
            options: ["1", "2", "3", "4"],
            correctIndex: 2
        },
        {
            subject: "Math",
            skill: "Basic Shapes",
            question: "Which shape has 3 corners? 🔺",
            options: ["Square", "Circle", "Triangle", "Rectangle"],
            correctIndex: 2
        },
        {
            subject: "Math",
            skill: "More or Less",
            question: "Which group has MORE stars? ⭐⭐ vs ⭐⭐⭐⭐⭐",
            options: ["The group with 2", "The group with 5"],
            correctIndex: 1
        },

        // ENGLISH
        {
            subject: "English",
            skill: "Letter Identification",
            question: "Which one is the letter 'A'?",
            options: ["B", "S", "A", "M"],
            correctIndex: 2
        },
        {
            subject: "English",
            skill: "Rhyming Words",
            question: "What rhymes with CAT?",
            options: ["Dog", "Hat", "Sun", "Pig"],
            correctIndex: 1
        },
        {
            subject: "English",
            skill: "Beginning Sounds",
            question: "What sound does 'DOG' start with?",
            options: ["/s/", "/m/", "/d/", "/t/"],
            correctIndex: 2
        },
        {
            subject: "English",
            skill: "Short Vowels",
            question: "Which word has the 'aaa' sound (short a)?",
            options: ["Bed", "PIG", "FAN", "POT"],
            correctIndex: 2
        },
        {
            subject: "English",
            skill: "Print Concepts",
            question: "Where do we start reading a book?",
            options: ["The back", "The front", "The middle"],
            correctIndex: 1
        },

        // SCIENCE
        {
            subject: "Science",
            skill: "Five Senses",
            question: "Which sense do we use to hear music?",
            options: ["Sight 👁️", "Smell 👃", "Hearing 👂", "Taste 👅"],
            correctIndex: 2
        },
        {
            subject: "Science",
            skill: "Plant Needs",
            question: "What do plants need to grow?",
            options: ["Pizza", "Water and Sun", "Toys", "Bed"],
            correctIndex: 1
        },
        {
            subject: "Science",
            skill: "Weather",
            question: "What do you wear when it is SNOWING?",
            options: ["Swimsuit", "T-shirt", "Heavy Coat", "Flip-flops"],
            correctIndex: 2
        },
        {
            subject: "Science",
            skill: "Living vs Non-living",
            question: "Which one is a LIVING thing?",
            options: ["A rock", "A teddy bear", "A puppy", "A toy car"],
            correctIndex: 2
        },
        {
            subject: "Science",
            skill: "Push and Pull",
            question: "What do you do to close a door?",
            options: ["Push it", "Sing to it"],
            correctIndex: 0
        }
    ];

    let activeQuestions = [];
    let currentIdx = 0;
    let stars = 0;
    let results = {};

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame() {
        const selected = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(i => i.value);
        if (selected.length === 0) {
            alert("Please select at least one subject!");
            return;
        }

        activeQuestions = questionBank.filter(q => selected.includes(q.subject));
        currentIdx = 0;
        stars = 0;
        results = {};
        selected.forEach(s => {
            results[s] = { total: 0, correct: 0, strengths: [], needsImprovement: [] };
        });

        renderQuestion();
        switchScreen('game-screen');
    }

    function renderQuestion() {
        const q = activeQuestions[currentIdx];
        document.getElementById('question-text').innerText = q.question;
        document.getElementById('star-counter').innerText = `⭐ ${stars}`;
        document.getElementById('progress').style.width = `${(currentIdx / activeQuestions.length) * 100}%`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-option';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(idx);
            container.appendChild(btn);
        });
    }

    function handleAnswer(choiceIdx) {
        const q = activeQuestions[currentIdx];
        const res = results[q.subject];
        res.total++;

        if (choiceIdx === q.correctIndex) {
            stars++;
            res.correct++;
            res.strengths.push(q.skill);
            // Visual feedback
            document.getElementById('star-counter').style.animation = 'bounce 0.5s';
            setTimeout(() => document.getElementById('star-counter').style.animation = '', 500);
        } else {
            res.needsImprovement.push(q.skill);
        }

        currentIdx++;
        if (currentIdx < activeQuestions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        const container = document.getElementById('results-container');
        container.innerHTML = '';

        for (const [subject, data] of Object.entries(results)) {
            const pct = (data.correct / data.total) * 100;
            let level = "At Level";
            let cssClass = "at";
            if (pct >= 85) { level = "Above Level"; cssClass = "above"; }
            else if (pct < 50) { level = "Below Level"; cssClass = "below"; }

            const card = document.createElement('div');
            card.className = 'report-card';
            card.innerHTML = `
                <h3>${subject}</h3>
                <div class="level-badge ${cssClass}">${level}</div>
                <p><strong>Score:</strong> ${data.correct} / ${data.total}</p>
                <p><strong>Can do:</strong></p>
                <ul class="skills-list">${data.strengths.map(s => `<li>${s}</li>`).join('') || '<li>Exploring...</li>'}</ul>
                <p><strong>Practice:</strong></p>
                <ul class="skills-list">${data.needsImprovement.map(s => `<li>${s}</li>`).join('') || '<li>All set!</li>'}</ul>
            `;
            container.appendChild(card);
        }

        switchScreen('results-screen');
    }
</script>

</body>
</html>
